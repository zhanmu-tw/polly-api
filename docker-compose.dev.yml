services:
  db:
    container_name: polly-db-dev
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: polly
      POSTGRES_PASSWORD: polly
      POSTGRES_DB: polly
    ports:
      - "5432:5432"
    volumes:
      - polly_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  polly_dev_pgdata:
