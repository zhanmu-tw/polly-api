name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install crane
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xzf - crane
          chmod +x crane && mv crane /usr/local/bin/

      - name: Build Docker Image
        run: |
          docker build -t forge-polly-api:latest .

      - name: Push to Registry
        run: |
          crane auth login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} -p "${{ secrets.REGISTRY_TOKEN }}"
          docker save forge-polly-api:latest -o /tmp/image.tar
          crane push /tmp/image.tar ${{ secrets.REGISTRY_URL }}/james/forge-polly-api:latest
          crane tag ${{ secrets.REGISTRY_URL }}/james/forge-polly-api:latest ${{ github.sha }}

      - name: Notify (Success)
        if: success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ **Forge Polly API** build successful!\n' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify (Failure)
        if: failure()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ **Forge Polly API** build failed!\n' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
