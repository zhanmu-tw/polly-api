name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear stale Docker credentials
        run: rm -f ~/.docker/config.json

      - name: Build and Push Docker Image
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
          docker build -t ${{ secrets.REGISTRY_URL }}/james/forge-polly-api:latest \
                       -t ${{ secrets.REGISTRY_URL }}/james/forge-polly-api:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_URL }}/james/forge-polly-api:latest
          docker push ${{ secrets.REGISTRY_URL }}/james/forge-polly-api:${{ github.sha }}

      - name: Notify (Success)
        if: success()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ **Forge Polly API** build successful!\n' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify (Failure)
        if: failure()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ **Forge Polly API** build failed!\n' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
