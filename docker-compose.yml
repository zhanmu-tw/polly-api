services:
  api:
    container_name: polly-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-polly}:${POSTGRES_PASSWORD:-polly}@polly-db:5432/${POSTGRES_DB:-polly}?schema=public"
      PORT: "3000"
      API_KEY: ${API_KEY:-some-api-key}
      GET_API_KEY: ${GET_API_KEY:-some-other-api-key}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    container_name: polly-db
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polly}
      POSTGRES_DB: ${POSTGRES_DB:-polly}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polly}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
